<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore and search the latest BigQuery release notes. Easily filter updates and share them on X (Twitter).">
    <title>BigQuery Release Explorer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1>BigQuery <span>Release Explorer</span></h1>
            </div>
            
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search release notes...">
                </div>

                <button id="theme-toggle" class="btn-theme-toggle" title="Toggle Light/Dark Mode">
                    <!-- Sun Icon (shown in dark mode) -->
                    <svg class="theme-icon sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- Moon Icon (shown in light mode) -->
                    <svg class="theme-icon moon-icon hidden" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                
                <button id="export-btn" class="btn btn-secondary" title="Export current view to CSV">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    <span>Export CSV</span>
                </button>

                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <svg id="refresh-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Main Content Grid -->
        <div class="app-content">
            <!-- Sidebar / Stats & Filters -->
            <aside class="app-sidebar">
                <div class="glass-card stats-card">
                    <h3>Overview</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">Total Updates</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-features">0</span>
                            <span class="stat-label">Features</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-issues">0</span>
                            <span class="stat-label">Issues</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-announcements">0</span>
                            <span class="stat-label">Announcements</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card filter-card">
                    <h3>Filter by Type</h3>
                    <div class="filter-options">
                        <button class="filter-btn active" data-filter="all">All Updates</button>
                        <button class="filter-btn" data-filter="Feature">
                            <span class="dot dot-feature"></span> Features
                        </button>
                        <button class="filter-btn" data-filter="Issue">
                            <span class="dot dot-issue"></span> Issues/Fixes
                        </button>
                        <button class="filter-btn" data-filter="Announcement">
                            <span class="dot dot-announcement"></span> Announcements
                        </button>
                        <button class="filter-btn" data-filter="Deprecation">
                            <span class="dot dot-deprecation"></span> Deprecations
                        </button>
                    </div>
                </div>
                
                <div class="glass-card info-card">
                    <h3>About Feed</h3>
                    <p>This application monitors the official Google Cloud BigQuery RSS feed, pulling the latest updates and release logs in real-time.</p>
                    <a href="https://docs.cloud.google.com/feeds/bigquery-release-notes.xml" target="_blank" class="feed-link">
                        View Raw XML Feed
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
                        </svg>
                    </a>
                </div>
            </aside>

            <!-- Main Stream -->
            <main class="app-main">
                <!-- Banner/Status -->
                <div id="status-banner" class="status-banner hidden"></div>

                <!-- Timeline Feed -->
                <div id="timeline" class="timeline-container">
                    <!-- Skeleton Loading State -->
                    <div class="skeleton-timeline">
                        <div class="skeleton-node">
                            <div class="skeleton-date"></div>
                            <div class="skeleton-card"></div>
                        </div>
                        <div class="skeleton-node">
                            <div class="skeleton-date"></div>
                            <div class="skeleton-card"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification for Info -->
    <div id="toast" class="toast-notification"></div>

    <script src="/static/script.js"></script>
</body>
</html>
